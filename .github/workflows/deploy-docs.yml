name: Deploy SDK Documentation

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment runs at a time; don't cancel in-progress deployments.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── .NET API docs (SHFB, Windows runner required) ────────────────────────────
  build-dotnet-docs:
    name: Build .NET docs (SHFB)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'

      - name: Install SHFB
        shell: powershell
        run: choco install sandcastlehelpfilebuilder --yes --no-progress

      - name: Build PFProSDK (generates XML doc)
        run: dotnet build "dotNET/PFProSDK/PFProSDK.csproj" -c Release

      - name: Build SHFB docs
        shell: powershell
        run: |
          # Chocolatey sets SHFBROOT at machine scope; pick it up explicitly.
          $env:SHFBROOT = [System.Environment]::GetEnvironmentVariable("SHFBROOT", "Machine")
          dotnet msbuild "dotNET/Payflow SDK Docs/PayflowSDKDocs.shfbproj" /p:Configuration=Release

      - name: Upload .NET docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-docs
          path: "dotNET/Payflow SDK Docs/Help/"

  # ── Java API docs (Javadoc, Ubuntu) ──────────────────────────────────────────
  build-java-docs:
    name: Build Java docs (Javadoc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Generate Javadoc
        run: mvn -f java/pom.xml javadoc:javadoc -q

      - name: Upload Java docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-docs
          path: java/target/site/apidocs/

  # ── Combine and deploy to GitHub Pages ───────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: [build-dotnet-docs, build-java-docs]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download .NET docs
        uses: actions/download-artifact@v4
        with:
          name: dotnet-docs
          path: _site/dotnet/

      - name: Download Java docs
        uses: actions/download-artifact@v4
        with:
          name: java-docs
          path: _site/java/

      - name: Create landing page
        run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Payflow Gateway SDK Documentation</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                     max-width: 760px; margin: 60px auto; padding: 0 24px; color: #24292f; }
              h1   { font-size: 1.75rem; margin-bottom: .25rem; }
              p    { color: #57606a; margin-top: .25rem; }
              .cards { display: flex; gap: 20px; margin-top: 2rem; flex-wrap: wrap; }
              .card  { flex: 1; min-width: 240px; border: 1px solid #d0d7de; border-radius: 8px;
                       padding: 20px 24px; text-decoration: none; color: inherit;
                       transition: border-color .15s, box-shadow .15s; }
              .card:hover { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,.15); }
              .card h2 { font-size: 1.15rem; margin: 0 0 8px; color: #0969da; }
              .card p  { font-size: .9rem; margin: 0; color: #57606a; }
              footer { margin-top: 3rem; font-size: .8rem; color: #8c959f;
                       border-top: 1px solid #d0d7de; padding-top: 1rem; }
            </style>
          </head>
          <body>
            <h1>Payflow Gateway SDK</h1>
            <p>API reference documentation for the Payflow Gateway .NET and Java SDKs — v5.0.3</p>
            <div class="cards">
              <a class="card" href="dotnet/">
                <h2>.NET SDK</h2>
                <p>C# / VB.NET API reference. Covers all transaction types, response objects, and utilities in the PFProSDK library.</p>
              </a>
              <a class="card" href="java/">
                <h2>Java SDK</h2>
                <p>Java API reference. Covers all transaction types, response objects, and utilities in the Payflow Java library.</p>
              </a>
            </div>
            <footer>
              Copyright 2026 PayPal &mdash; Licensed under the
              <a href="https://www.apache.org/licenses/LICENSE-2.0">Apache License 2.0</a> &mdash;
              <a href="https://github.com/paypal/payflow-gateway">GitHub</a>
            </footer>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
