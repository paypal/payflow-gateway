name: Publish to NuGet.org

# Triggers automatically when a GitHub release is published.
# Can also be run manually from the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Build and publish NuGet package
    runs-on: ubuntu-latest
    environment: nuget-publish

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'

      - name: Build and pack
        run: dotnet pack dotNET/PFProSDK/PFProSDK.csproj -c Release

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "dotNET/PFProSDK/bin/Release/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
